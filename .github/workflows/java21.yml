name: Integration Tests on Java 21

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: "temurin"
      - name: Switch To Maven 3
        run: |
          echo "distributionUrl=https://archive.apache.org/dist/maven/maven-3/3.9.15/binaries/apache-maven-3.9.15-bin.zip" > .mvn/wrapper/maven-wrapper.properties
          echo "wrapperVersion=3.3.2" >> .mvn/wrapper/maven-wrapper.properties
      - name: Build with Maven
        run: ./mvnw --batch-mode --update-snapshots install -Prun-its
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: it-build-logs
          path: target/it
